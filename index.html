<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>

  <style>
    :root {
      color-scheme: light;
      --page-bg: linear-gradient(135deg, #f6d365, #fda085);
      --card-bg: #ffffff;
      --text: #2f3136;
      --muted: #666b76;
      --notice: #8a8f99;
      --button-bg: #ff6b6b;
      --button-hover: #ff5252;
      --shadow: rgba(0, 0, 0, 0.15);
      --toggle-bg: #f1f3f5;
      --toggle-text: #2f3136;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --page-bg: linear-gradient(135deg, #1f2937, #111827);
      --card-bg: #181f2a;
      --text: #f7f7f8;
      --muted: #c4cad4;
      --notice: #9ca3af;
      --button-bg: #4f8cff;
      --button-hover: #3778ee;
      --shadow: rgba(0, 0, 0, 0.45);
      --toggle-bg: #273244;
      --toggle-text: #f7f7f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--page-bg);
      font-family: Arial, sans-serif;
      transition: background 0.25s ease;
    }

    .container {
      width: 90%;
      max-width: 420px;
      background: var(--card-bg);
      padding: 24px 20px 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px var(--shadow);
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }

    .theme-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .theme-toggle {
      width: auto;
      min-width: 102px;
      padding: 9px 12px;
      border-radius: 999px;
      background: var(--toggle-bg);
      color: var(--toggle-text);
      font-size: 14px;
      box-shadow: none;
    }

    .theme-toggle:hover {
      background: var(--toggle-bg);
      transform: translateY(-1px);
    }

    h1 {
      margin: 0 0 10px;
      color: var(--text);
      font-size: 28px;
    }

    p {
      color: var(--muted);
      margin: 0 0 25px;
      line-height: 1.5;
    }

    .numbers {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 25px;
      min-height: 55px;
    }

    .ball {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 18px;
      color: white;
      background: #ff7675;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: var(--button-bg);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: var(--button-hover);
      transform: translateY(-2px);
    }

    button:active {
      transform: scale(0.98);
    }

    .notice {
      margin-top: 18px;
      font-size: 13px;
      color: var(--notice);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="theme-row">
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크 모드로 변경">
        다크 모드
      </button>
    </div>

    <h1>로또 번호 추천기</h1>
    <p>버튼을 누르면 로또 번호 6개를 추천해줍니다.</p>

    <div class="numbers" id="numbers">
      <span class="ball">?</span>
      <span class="ball">?</span>
      <span class="ball">?</span>
      <span class="ball">?</span>
      <span class="ball">?</span>
      <span class="ball">?</span>
    </div>

    <button type="button" onclick="generateLotto()">번호 추천받기</button>

    <div class="notice">
      실제 당첨과는 무관한 랜덤 추천입니다.
    </div>
  </div>

  <script>
    const themeToggle = document.getElementById("themeToggle");
    const savedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const initialTheme = savedTheme || (prefersDark ? "dark" : "light");

    setTheme(initialTheme);

    themeToggle.addEventListener("click", () => {
      const currentTheme = document.documentElement.dataset.theme;
      setTheme(currentTheme === "dark" ? "light" : "dark");
    });

    function setTheme(theme) {
      document.documentElement.dataset.theme = theme;
      localStorage.setItem("theme", theme);
      themeToggle.textContent = theme === "dark" ? "화이트 모드" : "다크 모드";
      themeToggle.setAttribute(
        "aria-label",
        theme === "dark" ? "화이트 모드로 변경" : "다크 모드로 변경"
      );
    }

    function generateLotto() {
      const lottoNumbers = [];

      while (lottoNumbers.length < 6) {
        const randomNumber = Math.floor(Math.random() * 45) + 1;

        if (!lottoNumbers.includes(randomNumber)) {
          lottoNumbers.push(randomNumber);
        }
      }

      lottoNumbers.sort((a, b) => a - b);

      const numbersDiv = document.getElementById("numbers");
      numbersDiv.innerHTML = "";

      lottoNumbers.forEach(number => {
        const ball = document.createElement("span");
        ball.className = "ball";
        ball.textContent = number;

        if (number <= 10) {
          ball.style.background = "#f1c40f";
        } else if (number <= 20) {
          ball.style.background = "#3498db";
        } else if (number <= 30) {
          ball.style.background = "#e74c3c";
        } else if (number <= 40) {
          ball.style.background = "#2ecc71";
        } else {
          ball.style.background = "#9b59b6";
        }

        numbersDiv.appendChild(ball);
      });
    }
  </script>
</body>
</html>
